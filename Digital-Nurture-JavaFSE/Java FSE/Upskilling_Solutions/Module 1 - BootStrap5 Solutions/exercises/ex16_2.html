<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 16.2: Badge Overlay Positioning</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <style>
    .image-container {
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-light py-5">

  <div class="container py-4 text-center">
    <h2 class="fw-bold mb-3">Absolute Position Badges</h2>
    <p class="text-muted mb-5">Positioning a category tag relative to its container grid card image.</p>

    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <!-- Image Card with Relative Parent Container (Task 16.2) -->
        <div class="card border-0 shadow-sm image-container position-relative">
          
          <!-- Image Element -->
          <img src="../assets/images/workspace.png" class="img-fluid w-100" style="height: 250px; object-fit: cover;" alt="Workspace Announcement">

          <!-- Overlay Badge (Task 16.2) -->
          <!-- position-absolute: aligns relative to closest relative parent -->
          <!-- top-0: pins to top edge -->
          <!-- end-0: pins to right edge -->
          <!-- m-3: adds margin offset -->
          <span class="position-absolute top-0 end-0 m-3 badge bg-danger text-uppercase px-3 py-2 fw-bold shadow-sm">
            Featured
          </span>

          <div class="card-body text-start p-4 bg-white">
            <h5 class="fw-bold text-dark mb-2">Workspace Desk Bookings</h5>
            <p class="text-muted small mb-0">
              Desks in the co-working zone are now bookable 1 week in advance. Register via the portal to secure your desk spot.
            </p>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="../assets/js/bootstrap.bundle.min.js"></script>

  <!-- Exercise Metadata for Workspace Dashboard -->
  <script id="exercise-metadata" type="application/json">
  {
    "title": "Exercise 16.2: Badge Overlay",
    "description": "Use position-relative and position-absolute to overlay a badge over an image component.",
    "classes": [".position-relative", ".position-absolute", ".top-0", ".end-0", ".m-3", ".badge", ".bg-danger", ".card", ".img-fluid", ".shadow-sm"],
    "responsive": "Image and absolute badge overlay maintain correct layout alignment across phone, tablet, and desktop viewports.",
    "comments": "The parent card must define '.position-relative' so that the absolute badge aligns within card boundaries instead of the main page body."
  }
  </script>
</body>
</html>
