<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 1.1: Setting up Bootstrap 5 via CDN</title>
  <!-- Link Bootstrap 5 CSS via jsDelivr CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light py-5">

  <div class="container text-center py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h1 class="display-4 fw-bold text-success mb-3">Greenwood Community Portal</h1>
        <p class="lead text-muted mb-4">
          Welcome to the digital hub of Greenwood! This portal is powered by Bootstrap 5, loaded dynamically via jsDelivr CDN. You can find local news, event listings, and connect with neighbors.
        </p>
        <button class="btn btn-primary btn-lg shadow-sm">Explore Local Events</button>
      </div>
    </div>
  </div>

  <!-- Link Bootstrap 5 JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- Exercise Metadata for Workspace Dashboard -->

</body>
</html>
